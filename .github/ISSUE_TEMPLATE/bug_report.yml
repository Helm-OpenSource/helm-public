name: Bug report
description: Report a reproducible defect in Helm
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please run `npm run quickstart:doctor` for Docker-path problems and read `SUPPORT.md`.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and discussions
          required: true
        - label: I am not posting secrets, customer data, or private infrastructure details
          required: true
        - label: This is not a private security vulnerability disclosure
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable repro
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: verification
    attributes:
      label: Verification run
      options:
        - label: `npm run quickstart:doctor`
        - label: `npm run self-check`
        - label: `npm run check:boundaries`
        - label: `npm run typecheck`
        - label: `npm run lint`
        - label: `npm run test`
        - label: `npm run build`
        - label: `npm run e2e`
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Redact secrets before pasting
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15 / Ubuntu 24.04 / WSL2
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: 20.x
  - type: input
    id: runtime
    attributes:
      label: Runtime path
      placeholder: Docker quickstart / local MySQL / CI
