name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Type check
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint (strict — fails on any warning, including
          helm-design-tokens raw-color violations)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run lint:strict

  repo-guards:
    name: Repo Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Self check
        run: npm run self-check

      - name: Boundary checks
        run: npm run check:boundaries

      - name: Public release guard
        run: npm run check:public-release

      - name: Public commit metadata guard (PR baseline)
        if: github.event_name == 'pull_request'
        env:
          HELM_PUBLIC_COMMIT_METADATA_BASELINE_REF: origin/${{ github.base_ref }}
        run: npm run check:public-commit-metadata

      - name: Public commit metadata guard (push baseline)
        if: github.event_name != 'pull_request'
        env:
          HELM_PUBLIC_COMMIT_METADATA_BASELINE_REF: HEAD^
        run: npm run check:public-commit-metadata

      - name: Secret history guard (PR baseline)
        if: github.event_name == 'pull_request'
        env:
          HELM_SECRET_HISTORY_BASELINE_REF: origin/${{ github.base_ref }}
        run: npm run check:secret-history

      - name: Secret history guard (push baseline)
        if: github.event_name != 'pull_request'
        env:
          # origin/main still carries the documented 2026-04-27 remediation debt.
          # Push CI should reject new listed compromised commits while keeping the
          # full no-baseline release check available for controlled remediation.
          HELM_SECRET_HISTORY_BASELINE_REF: HEAD^
        run: npm run check:secret-history

  validate-env:
    name: Validate Environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Create example .env file
        run: cp .env.example .env

      - name: Validate environment
        run: npm run validate:env
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, lint, repo-guards]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          path: .next/
          retention-days: 7

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [type-check, lint, repo-guards]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Create example .env file
        run: cp .env.example .env

      - name: Run unit tests
        run: npm run test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 7

  quality-regression:
    name: Public Guard Regression
    runs-on: ubuntu-latest
    needs: [type-check, lint, repo-guards]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Create example .env file
        run: cp .env.example .env

      - name: Run public guard regression
        run: npm run quality:regression

  e2e:
    name: Public Structure Smoke
    runs-on: ubuntu-latest
    needs: [type-check, lint, repo-guards]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run public structure smoke
        run: npm run public:e2e:smoke
