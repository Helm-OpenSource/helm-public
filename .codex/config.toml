[features]
codex_hooks = true

[profiles.standard]
approval_policy = "on-failure"
sandbox_mode = "workspace-write"

[profiles.strict]
approval_policy = "untrusted"
sandbox_mode = "workspace-write"

[roles.explorer]
description = "Repo-local exploration role for read-heavy discovery and diagnostics."
profile = "standard"

[roles.reviewer]
description = "Repo-local review role for guard, contract, and regression inspection."
profile = "strict"

[roles.docs_researcher]
description = "Repo-local docs role for README, docs index, and report synchronization."
profile = "standard"
