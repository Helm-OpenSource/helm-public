name: Docs Lifecycle — Monthly Packet

# Step 1 of HELM_DOC_LIFECYCLE_POLICY_V1 §1.4.
#
# Runs at the start of each month, regenerates the docs reference graph,
# produces a new docs-owner-review-packet-<YYYY-MM>.{md,json}, and opens
# a PR for the owner to review. Owner has 30 days from PR merge to
# touch/refute candidates before the auto-apply workflow promotes
# anything (see docs-lifecycle-auto-apply.yml).
#
# Trigger: 02:00 UTC on day-1 of every month (cron-tolerant; GitHub may
# delay by minutes/hours). Also manually dispatchable.

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      retention_days:
        description: 'Retention window in days (active + age > N + 0 refs → dormant candidate)'
        required: false
        default: '90'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-packet:
    name: Generate monthly review packet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Refresh docs reference graph
        run: npx tsx scripts/docs-reference-scan.ts

      - name: Generate review packet
        run: |
          RETENTION="${{ github.event.inputs.retention_days || '90' }}"
          npx tsx scripts/docs-owner-review-packet.ts --retention-days "$RETENTION"

      - name: Compute month key
        id: month
        run: echo "key=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: docs-lifecycle/monthly-packet-${{ steps.month.outputs.key }}
          base: main
          commit-message: |
            chore(docs): monthly lifecycle packet ${{ steps.month.outputs.key }}

            Auto-generated by .github/workflows/docs-lifecycle-monthly-packet.yml
            (HELM_DOC_LIFECYCLE_POLICY_V1 §1.4 Step 1).

            Owner: please review the candidate buckets. Items left untouched
            for 30 days will be auto-promoted by the auto-apply workflow.
          title: '[docs-lifecycle] monthly review packet ${{ steps.month.outputs.key }}'
          body: |
            ## Docs lifecycle — monthly review packet (${{ steps.month.outputs.key }})

            This PR adds the new `docs-owner-review-packet-${{ steps.month.outputs.key }}.{md,json}`.

            ### Owner action

            Open `docs/internal/docs-owner-review-packet-${{ steps.month.outputs.key }}.md`
            and triage the five buckets:

            - **Dormant candidates** — auto-promoted to `status: dormant` after 30 days if untouched
            - **Archive-ready** — auto-promoted to `status: archived` after 30 days if untouched
            - **Pending physical move** — handled by `scripts/docs-archive-mover.ts`
            - **Stale frontmatter** — manual review only; not auto-applied
            - **Suspicious pattern + active status** — manual review only; not auto-applied

            ### To refute a candidate

            Any of the following counts as a refutation (the auto-apply workflow will skip the file):

            - Bump `review_after:` in the file's frontmatter
            - Change `status:` to a deliberate value
            - Any commit that touches the file

            ### Reference

            Policy: `docs/internal/HELM_DOC_LIFECYCLE_POLICY_V1.md` §1.4
            Generator: `scripts/docs-owner-review-packet.ts`
          labels: |
            docs-lifecycle
            automated
          delete-branch: true
