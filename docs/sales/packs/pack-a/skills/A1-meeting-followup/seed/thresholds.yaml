# Skill A1 默认阈值（强约束 A，开箱即用）

follow_up:
  generation_target_minutes: 5      # 会后多久内必须生成清单
  user_review_required: true        # 强制人工确认才能发送
  silence_renew_after_hours: 48     # 沉默多久后触发再促模板
  max_renew_attempts: 4             # 最多再促次数

boundary_commitment:
  default_red_words:                # 越界承诺红线词典（开源 5 项；商业版 ≥30 项）
    - "肯定可以"
    - "绝对支持"
    - "独家"
    - "免费包含"
    - "承诺给您 X 折扣"
  recall_target: 0.70               # pilot 4 周目标识别准
  recall_steady: 0.85               # 6 月稳态目标
  escalate_to_manager: true         # 重大承诺自动通知主管（A3）

audit:
  retention_days: 90
  audit_chain_required: true

privacy:
  meeting_recording_consent: required
  client_facing_action_default: draft  # 对外动作默认建议，不自动执行
