name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Type check
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint (strict — fails on any warning, including
          helm-design-tokens raw-color violations)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run lint:strict

  repo-guards:
    name: Repo Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Self check
        run: npm run self-check

      - name: Boundary checks
        run: npm run check:boundaries

      - name: Public release guard
        run: npm run check:public-release

      - name: Secret history guard (PR baseline)
        if: github.event_name == 'pull_request'
        env:
          HELM_SECRET_HISTORY_BASELINE_REF: origin/${{ github.base_ref }}
        run: npm run check:secret-history

      - name: Secret history guard
        if: github.event_name != 'pull_request'
        run: npm run check:secret-history

  validate-env:
    name: Validate Environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Create example .env file
        run: cp .env.example .env

      - name: Validate environment
        run: npm run validate:env
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, lint, repo-guards]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: .next/
          retention-days: 7

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [type-check, lint, repo-guards]
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/helm2026_ci_test?charset=utf8mb4
      DB_RESET_ALLOWLIST: helm2026_ci_test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Create example .env file
        run: cp .env.example .env

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Prepare MySQL test database
        run: npm run db:prepare

      - name: Run unit tests
        run: npm run test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 7

  quality-regression:
    name: Quality Regression
    runs-on: ubuntu-latest
    needs: [type-check, lint, repo-guards]
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/helm2026_ci_quality?charset=utf8mb4
      DB_RESET_ALLOWLIST: helm2026_ci_quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Create example .env file
        run: cp .env.example .env

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Prepare MySQL quality database
        run: npm run db:prepare

      - name: Run quality regression
        run: npm run quality:regression

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [type-check, lint, repo-guards]
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/helm2026_ci_e2e_base?charset=utf8mb4
      DB_RESET_ALLOWLIST: helm2026_ci_e2e_base
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Create example .env file
        run: cp .env.example .env

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser e2e
        run: npm run e2e

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
            .tmp/playwright/
          if-no-files-found: ignore
          retention-days: 7
