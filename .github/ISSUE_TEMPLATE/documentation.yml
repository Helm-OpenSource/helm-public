name: Documentation correction
description: Report stale, unclear, or incorrect public documentation.
title: "docs: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for public documentation only. Public docs must remain evidence-gated and must not include customer data, private proof, private deployment evidence, credentials, or time-bound commercial promises.
  - type: checkboxes
    id: public-safety
    attributes:
      label: Public-safety confirmation
      options:
        - label: This request contains no customer names, private contacts, private domains, internal IPs, credentials, private deployment evidence, or undisclosed security details.
          required: true
  - type: input
    id: doc-path
    attributes:
      label: Document path
      placeholder: "README.md, docs/getting-started.md, docs/product/..."
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is unclear or wrong?
      description: Explain the mismatch, stale claim, typo, or missing context.
    validations:
      required: true
  - type: textarea
    id: proposed-change
    attributes:
      label: Proposed correction
      description: Keep wording review-first. Do not turn recommendations into commitments.
    validations:
      required: false
  - type: dropdown
    id: claim-risk
    attributes:
      label: Claim risk
      options:
        - No customer-facing commitment risk
        - Might be read as a roadmap promise
        - Might be read as Cloud or Enterprise readiness
        - Might be read as automatic send, write, approval, execution, or settlement
        - Not sure
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Suggested verification
      description: List docs guards or manual checks that should confirm the change.
      placeholder: |
        npm run check:public-docs
        npm run check:public-release
    validations:
      required: false
