name: Feature request
description: Propose a scoped change that fits Helm's boundaries
title: "[feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Helm is intentionally not a full workflow engine, marketplace, or auto-execution plane. Requests that cross those boundaries may be declined by design.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions
          required: true
        - label: This request does not assume auto-send, auto-approve, or auto-execution by default
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Keep it scoped and concrete
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Boundary check
      description: Explain how this stays within Helm's current controlled-trial posture
      placeholder: |
        - recommendation vs commitment
        - review-first
        - no tenant-private leakage
        - no platform expansion
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: evidence
    attributes:
      label: Real use case or operator workflow
      description: Describe the delivery-engineer or operator scenario
