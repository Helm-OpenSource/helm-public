name: Quickstart Smoke

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-quickstart:
    name: Docker quickstart smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Quickstart doctor
        run: npm run quickstart:doctor

      - name: Start stack
        run: npm run quickstart -- up --build -d

      - name: Wait for health
        run: |
          for attempt in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:3000/health >/tmp/helm-health.html; then
              exit 0
            fi
            sleep 10
          done
          docker compose logs app mysql
          exit 1

      - name: Verify landing page
        run: curl -fsS http://127.0.0.1:3000/ >/tmp/helm-root.html

      - name: Stop stack
        if: always()
        run: docker compose down -v
